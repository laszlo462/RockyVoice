<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocky Voice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "IBM Plex Mono", "SF Mono", "Consolas", monospace;
      background: #0a0a0a;
      color: #e0ddd5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: #b8b3a7;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #6b6560;
      margin-bottom: 2rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    #startScreen {
      text-align: center;
      padding: 4rem 0;
    }

    #startScreen button {
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 1.2rem 2.5rem;
      border-radius: 8px;
      border: 1px solid #8a7a60;
      background: #1a1a1a;
      color: #e0ddd5;
      cursor: pointer;
      transition: all 0.2s;
    }

    #startScreen button:hover {
      background: #242420;
      border-color: #b8a878;
    }

    #startScreen p {
      font-size: 0.75rem;
      color: #4a4540;
      margin-top: 1rem;
    }

    #app { display: none; }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
      max-height: 60vh;
      overflow-y: auto;
    }

    .message {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
      transition: border-color 0.3s;
    }

    .message.pending { border-color: #3a3530; color: #6b6560; }
    .message.speaking { border-color: #8a7a60; color: #e0ddd5; }
    .message.done { border-color: #2a2a2a; color: #b8b3a7; }
    .message.error { border-color: #5a3030; color: #a05040; }

    .message-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b6560;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3a3530;
    }

    .pending .dot { background: #8a7a60; animation: pulse 1.5s infinite; }
    .speaking .dot { background: #a09060; animation: pulse 0.8s infinite; }
    .done .dot { background: #4a6040; }
    .error .dot { background: #a05040; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .wave {
      display: none;
      gap: 3px;
      align-items: center;
      height: 18px;
      margin-top: 0.75rem;
    }

    .speaking .wave { display: flex; }

    .wave span {
      display: block;
      width: 3px;
      background: #8a7a60;
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .wave span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .wave span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
    .wave span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
    .wave span:nth-child(5) { height: 6px; animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1.2); }
    }

    .empty {
      text-align: center;
      color: #3a3530;
      font-size: 0.85rem;
      padding: 3rem 0;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: #4a4540;
      margin-top: 1rem;
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #3a3530;
    }

    .status-bar.connected .status-dot { background: #4a6040; }
    .status-bar.disconnected .status-dot { background: #a05040; }
  </style>
</head>
<body>
  <h1>Rocky Voice</h1>
  <p class="subtitle">hear space friend speak</p>

  <div class="container">
    <div id="startScreen">
      <button onclick="start()">enable Rocky voice</button>
      <p>click once. then Rocky speaks automatic.</p>
    </div>

    <div id="app">
      <div class="feed" id="feed">
        <div class="empty" id="empty">waiting for Rocky words...</div>
      </div>
      <div class="status-bar disconnected" id="statusBar">
        <span class="status-dot"></span>
        <span id="statusText">connecting...</span>
      </div>
    </div>
  </div>

  <script>
    let audioCtx;
    const messageEls = new Map();   // msgId -> element
    const playState = new Map();    // msgId -> scheduling state
    let sampleRate = 48000;         // overwritten by the "connected" event
    let channels = 1;

    function start() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
      connect();
    }

    function connect() {
      const es = new EventSource("/api/events");
      const statusBar = document.getElementById("statusBar");
      const statusText = document.getElementById("statusText");

      es.onopen = () => {
        statusBar.className = "status-bar connected";
        statusText.textContent = "listening";
      };

      es.onerror = () => {
        statusBar.className = "status-bar disconnected";
        statusText.textContent = "reconnecting...";
      };

      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "connected") {
          if (data.sampleRate) sampleRate = data.sampleRate;
          if (data.channels) channels = data.channels;
          return;
        }
        if (data.type === "pending") addMessage(data.msgId, data.text);
        if (data.type === "chunk") handleChunk(data.msgId, data.audio);
        if (data.type === "done") handleDone(data.msgId);
        if (data.type === "error") markError(data.msgId, data.error);
      };
    }

    function setHeader(el, label) {
      el.querySelector(".message-header").innerHTML =
        `<span class="dot"></span> ${label}`;
    }

    function addMessage(msgId, text) {
      document.getElementById("empty").style.display = "none";
      const feed = document.getElementById("feed");
      const el = document.createElement("div");
      el.className = "message pending";
      el.innerHTML = `
        <div class="message-header"><span class="dot"></span> generating voice...</div>
        <div class="message-text">${escapeHtml(text)}</div>
        <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
      `;
      feed.appendChild(el);
      feed.scrollTop = feed.scrollHeight;
      messageEls.set(msgId, el);
      playState.set(msgId, {
        nextTime: 0,        // running timeline cursor for gapless playback
        endTime: 0,         // when the last scheduled chunk finishes
        leftover: new Uint8Array(0), // carry odd trailing byte between chunks
        gotAudio: false,
        lastSource: null,
      });
    }

    // Decode one base64 PCM chunk (16-bit signed LE) and schedule it to play
    // immediately after whatever is already queued for this message.
    function handleChunk(msgId, b64) {
      const st = playState.get(msgId);
      if (!st || !audioCtx) return;
      const el = messageEls.get(msgId);

      if (!st.gotAudio && el) {
        el.className = "message speaking";
        setHeader(el, "speaking");
      }
      st.gotAudio = true;

      const bin = atob(b64);
      let bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

      if (st.leftover.length) {
        const merged = new Uint8Array(st.leftover.length + bytes.length);
        merged.set(st.leftover, 0);
        merged.set(bytes, st.leftover.length);
        bytes = merged;
      }

      // 16-bit samples are 2 bytes; carry any odd trailing byte to next chunk.
      const usableLen = bytes.length - (bytes.length % 2);
      st.leftover = bytes.slice(usableLen);
      if (usableLen === 0) return;

      const numSamples = usableLen / 2;
      const view = new DataView(bytes.buffer, bytes.byteOffset, usableLen);
      const audioBuffer = audioCtx.createBuffer(channels, numSamples, sampleRate);
      const ch = audioBuffer.getChannelData(0);
      for (let i = 0; i < numSamples; i++) {
        ch[i] = view.getInt16(i * 2, true) / 32768;
      }

      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      if (st.nextTime < now) st.nextTime = now; // never schedule in the past
      src.start(st.nextTime);
      st.nextTime += audioBuffer.duration;
      st.endTime = st.nextTime;
      st.lastSource = src;
    }

    function handleDone(msgId) {
      const st = playState.get(msgId);
      const el = messageEls.get(msgId);
      const finish = () => {
        if (el) { el.className = "message done"; setHeader(el, "done"); }
        playState.delete(msgId);
      };
      if (!st || !st.gotAudio) { finish(); return; }
      // If playback already caught up, finish now; otherwise wait for the
      // final scheduled chunk to end.
      if (audioCtx.currentTime >= st.endTime - 0.02 || !st.lastSource) finish();
      else st.lastSource.onended = finish;
    }

    function markError(msgId, error) {
      const el = messageEls.get(msgId) ||
        document.querySelector(".message.pending:last-of-type");
      if (el) {
        el.className = "message error";
        setHeader(el, `error: ${escapeHtml(error || "")}`);
      }
      playState.delete(msgId);
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
